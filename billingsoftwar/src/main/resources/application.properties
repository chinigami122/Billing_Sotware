spring.application.name=billingsoftwar
# Database Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/billing_app}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Let Hibernate create the tables automatically
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

aws.access.key=${AWS_ACCESS_KEY:minioadmin}
aws.secret.key=${AWS_SECRET_KEY:minioadmin}
aws.region=${AWS_REGION:us-east-1}
aws.bucket.name=${AWS_BUCKET_NAME:billing-app}

jwt.secret.key=${JWT_SECRET_KEY:change_me_for_production}

razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Make sure it starts with sk_test_ for local test mode
stripe.api.key=${STRIPE_API_KEY:}

server.servlet.context-path=${SERVER_CONTEXT_PATH:/api/v1.0}
